<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrowave Set Generator</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="container_carro">
            <p class="nome_carro"></p>
            <img src="" alt="Aguardando o carro aparecer..." class="icone_carro">
        </div>

        <div class="container_pneu">
            <p class="numero_pneu"></p>
            <img src="" alt="Aguardando o pneu aparecer..." class="icone_pneu">
        </div>

        <img src="" alt="Aguardando a sirene aparecer..." class="sirene">

        <div class="container_placa">
            <p class="numero_placa"></p>
            <img src="" alt="Aguardando a placa aparecer..." class="icone_placa">
        </div>

        <div class="container_pista">
            <p class="nome_pista"></p>
            <img src="" alt="Aguardando a pista aparecer..." class="icone_pista">
        </div>
        
        <p id="ultima-atualizacao"></p>
        <p id="relogio"></p>
        <p id="proxima-atualizacao"></p>

        <!-- <p id="cronometro"></p> -->
    </div>

    <script src="random.js"></script>
</body>
</html>
